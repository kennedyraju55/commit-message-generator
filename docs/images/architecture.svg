<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#00b4d8"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input Sources -->
  <rect x="30" y="60" width="110" height="50" rx="8" fill="#1a1e2e" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="85" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#00b4d8" text-anchor="middle">Staged Diff</text>
  <text x="85" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">git diff --cached</text>

  <rect x="30" y="120" width="110" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">All Changes</text>
  <text x="85" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">git diff</text>

  <rect x="30" y="180" width="110" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Diff File</text>
  <text x="85" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">--diff-file</text>

  <!-- Arrows to Diff Reader -->
  <line x1="140" y1="85" x2="190" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="145" x2="190" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="205" x2="190" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Diff Reader -->
  <rect x="195" y="120" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="255" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Diff Reader</text>
  <text x="255" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Parse changes</text>

  <line x1="315" y1="145" x2="365" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Truncation -->
  <rect x="370" y="120" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Truncation</text>
  <text x="430" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">max_diff_chars</text>

  <line x1="490" y1="145" x2="540" y2="145" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Prompt Builder -->
  <rect x="545" y="120" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="605" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Prompt Builder</text>
  <text x="605" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Type + context</text>

  <!-- Arrow down -->
  <line x1="605" y1="170" x2="605" y2="220" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="520" y="225" width="170" height="60" rx="10" fill="#1a1e2e" stroke="#00b4d8" stroke-width="2"/>
  <text x="605" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#00b4d8" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="605" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Conventional Commits</text>

  <!-- Arrow left -->
  <line x1="520" y1="255" x2="440" y2="255" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Commit Parser -->
  <rect x="300" y="230" width="135" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="367" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Commit Parser</text>
  <text x="367" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">type(scope): message</text>

  <line x1="300" y1="255" x2="240" y2="255" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Emoji Mapper -->
  <rect x="100" y="230" width="135" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="167" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Emoji Mapper</text>
  <text x="167" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">✨ 🐛 📝 🎨</text>

  <!-- Arrow down -->
  <line x1="167" y1="280" x2="167" y2="320" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="67" y="325" width="200" height="55" rx="10" fill="#1a1e2e" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="167" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#00b4d8" text-anchor="middle">📝 Multiple Suggestions</text>
  <text x="167" y="368" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Ranked commit messages</text>

  <!-- Footer -->
  <rect x="30" y="345" width="740" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="550" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local Processing • Conventional Commits Standard • Emoji Support</text>
</svg>
